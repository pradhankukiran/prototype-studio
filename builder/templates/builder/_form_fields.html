{% for field in form %}
    <div class="form-row{% if field.field.widget.input_type == 'checkbox' %} form-row-inline{% endif %}{% if field.field.widget.input_type == 'textarea' or field.field.widget.input_type == 'checkbox' %} form-row-wide{% endif %}">
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% if field.help_text %}
            <p class="field-help">{{ field.help_text }}</p>
        {% endif %}
        {% if field.errors %}
            <div class="field-errors">{{ field.errors }}</div>
        {% endif %}
    </div>
{% endfor %}
