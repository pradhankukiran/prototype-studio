services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: prototype_studio
      POSTGRES_USER: prototype_studio
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prototype_studio"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: changeme-in-production
      ALLOWED_HOSTS: localhost,127.0.0.1
      POSTGRES_DB: prototype_studio
      POSTGRES_USER: prototype_studio
      POSTGRES_PASSWORD: changeme
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      GENERATED_ROOT: /app/generated
      SECURE_SSL_REDIRECT: "false"
    volumes:
      - generated:/app/generated
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"

volumes:
  pgdata:
  generated:
